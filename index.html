<!DOCTYPE html>
<html lang="mr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathi Poetry | Sangharsh Magare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Mukta:wght@400;500;600;700;800&family=Yatra+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Mukta', sans-serif; background-color: #030712; }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen">

    <header class="p-6 text-center">
        <h1 class="text-3xl font-bold text-emerald-400">MARATHI POETRY</h1>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <section class="text-center py-10">
            <h2 class="text-4xl font-bold text-white mb-4">शब्दांच्या दुनियेतलं स्वच्छंद पाऊल...</h2>
            <p class="text-slate-300">मी माझ्या मनातलं लिहितो… जसं आहे तसं.</p>
        </section>

        <section class="grid gap-4">
            <div class="bg-slate-900 p-6 rounded-2xl border border-emerald-500/20">
                <h3 class="text-xl font-bold text-emerald-400 mb-2">माझे साहित्य</h3>
                <p class="text-slate-400">येथे कविता प्रदर्शित होतील.</p>
            </div>
        </section>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
